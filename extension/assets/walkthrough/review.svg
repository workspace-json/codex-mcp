<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect x="0" y="0" width="640" height="360" rx="10" fill="#1e1e1e"/>
  <text x="40" y="52" fill="#bbbbbb" font-size="13" letter-spacing="1">TWO INDEPENDENT PLANES</text>
  <!-- deterministic -->
  <rect x="40" y="78" width="270" height="180" rx="8" fill="#2a1f1f" stroke="#f14c4c" stroke-width="1.5"/>
  <text x="60" y="112" fill="#9d9d9d" font-size="13">Deterministic decision</text>
  <text x="60" y="150" fill="#f14c4c" font-size="30">DENY</text>
  <text x="60" y="182" fill="#c9c9c9" font-size="13">2 evidenced partners</text>
  <text x="60" y="202" fill="#c9c9c9" font-size="13">omitted</text>
  <text x="60" y="236" fill="#8a8a8a" font-size="12">governs — always enforced</text>
  <!-- advisory -->
  <rect x="330" y="78" width="270" height="180" rx="8" fill="#1e2a1e" stroke="#89d185" stroke-width="1.5"/>
  <text x="350" y="112" fill="#9d9d9d" font-size="13">Advisory result</text>
  <text x="350" y="150" fill="#89d185" font-size="24">PASS</text>
  <text x="350" y="176" fill="#a9d9a2" font-size="14">within reviewed scope</text>
  <text x="350" y="210" fill="#c9c9c9" font-size="12">GPT-5.6 · Fresh</text>
  <text x="350" y="236" fill="#8a8a8a" font-size="12">advisory — never overrides</text>
  <rect x="40" y="286" width="560" height="52" rx="6" fill="#2d2d2d"/>
  <text x="60" y="317" fill="#c9c9c9" font-size="13">A PASS never lifts a DENY. The disagreement is the point: two independent checks.</text>
</svg>
