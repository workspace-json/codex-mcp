  <!-- state 3 -->
  <rect x="470" y="80" width="170" height="150" rx="8" fill="#1e2a1e" stroke="#89d185" stroke-width="1.5"/>
  <text x="555" y="146" fill="#89d185" font-size="26" text-anchor="middle">✓</text>
