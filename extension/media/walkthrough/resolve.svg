<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect x="0" y="0" width="640" height="360" rx="10" fill="#1e1e1e"/>
  <text x="40" y="52" fill="#bbbbbb" font-size="13" letter-spacing="1">EVERY SURFACE UPDATES TOGETHER</text>
  <!-- state 1 -->
  <rect x="40" y="80" width="170" height="150" rx="8" fill="#2a1f1f" stroke="#f14c4c" stroke-width="1.5"/>
  <text x="125" y="150" fill="#f14c4c" font-size="34" text-anchor="middle">2</text>
  <text x="125" y="180" fill="#d69a9a" font-size="13" text-anchor="middle">omitted</text>
  <text x="228" y="162" fill="#6f6f6f" font-size="26">→</text>
  <!-- state 2 -->
  <rect x="255" y="80" width="170" height="150" rx="8" fill="#2a2415" stroke="#cca700" stroke-width="1.5"/>
  <text x="340" y="150" fill="#cca700" font-size="34" text-anchor="middle">1</text>
  <text x="340" y="180" fill="#cbb56a" font-size="13" text-anchor="middle">omitted</text>
