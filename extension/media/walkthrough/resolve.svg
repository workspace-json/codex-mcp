  <rect x="40" y="262" width="600" height="74" rx="6" fill="#2d2d2d"/>
  <text x="60" y="292" fill="#e0c14c" font-size="14">Covered does not mean safe.</text>
  <text x="60" y="316" fill="#c9c9c9" font-size="13">Run the repository's verification before treating the change as complete.</text>
