name: Publish extension

# One tagged release ships the VS Code extension to both marketplaces.
#   git tag v0.1.3 && git push --tags
# The version is taken from the tag (v0.1.3 -> 0.1.3), validated, written into
# the manifest at build time, and published as a pre-built VSIX. No hand-run
# publish commands.
#
# Required repository secrets:
#   VSCE_PAT    Azure DevOps PAT with Marketplace > Manage (VS Code Marketplace)
#   OVSX_TOKEN  open-vsx.org access token (Open VSX)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub Release and attach the VSIX

concurrency:
  group: publish-extension-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Derive the version from the tag and STRICTLY validate it. The tag name
      # is attacker-influenceable, so it is read from an env var (never inlined
      # into the shell) and rejected unless it is a clean semver — which also
      # guarantees it carries no shell metacharacters for later steps.
      - name: Derive and validate version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::tag '$REF_NAME' is not a valid vX.Y.Z version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing workspace.json extension v$VERSION"

      - name: Install extension dependencies
        run: npm --prefix extension ci

      - name: Set the manifest version from the tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: node -e "const f='extension/package.json';const p=require('./'+f);p.version=process.env.VERSION;require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"

      - name: Package the VSIX
        run: npm --prefix extension run package

      - name: Locate the VSIX
        id: vsix
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          FILE="extension/workspacejson-codex-decorations-${VERSION}.vsix"
          test -f "$FILE" || { echo "::error::expected VSIX not found: $FILE"; exit 1; }
          echo "path=$FILE" >> "$GITHUB_OUTPUT"

      - name: Publish to the VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VSIX: ${{ steps.vsix.outputs.path }}
        run: npx --yes @vscode/vsce publish --packagePath "$VSIX" --pat "$VSCE_PAT"

      - name: Ensure the Open VSX namespace exists
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: npx --yes ovsx create-namespace workspace-json --pat "$OVSX_TOKEN" || echo "namespace already exists"

      - name: Publish to Open VSX
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
          VSIX: ${{ steps.vsix.outputs.path }}
        run: npx --yes ovsx publish "$VSIX" --pat "$OVSX_TOKEN"

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VSIX: ${{ steps.vsix.outputs.path }}
        run: gh release create "$TAG" "$VSIX" --title "workspace.json extension $TAG" --generate-notes
