name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Report high-severity dependency vulnerabilities
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Check repository structure
        run: npm run check:structure

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test

      - name: Run smoke tests
        run: npm run smoke

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Ensure package contains plugin assets
        run: |
          npm pack --dry-run 2>&1 | tee pack.log
          grep -F '.mcp.json' pack.log
          grep -F '.codex-plugin/' pack.log
          grep -F '.codex/agents/' pack.log
          grep -F 'hooks/' pack.log
